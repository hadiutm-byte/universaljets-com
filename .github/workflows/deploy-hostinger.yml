name: Deploy to Hostinger (Vite + SFTP)

on:
  push:
    branches: ["main"]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Clean remote public_html (recommended)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOSTINGER_HOST }}
          username: ${{ secrets.HOSTINGER_USER }}
          port: ${{ secrets.HOSTINGER_PORT }}
          key: ${{ secrets.HOSTINGER_SFTP_KEY }}
          script: |
            set -e
            rm -rf "${{ secrets.HOSTINGER_REMOTE_PATH }}"/*
            mkdir -p "${{ secrets.HOSTINGER_REMOTE_PATH }}"

      - name: Upload dist/ via SFTP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.HOSTINGER_HOST }}
          username: ${{ secrets.HOSTINGER_USER }}
          port: ${{ secrets.HOSTINGER_PORT }}
          key: ${{ secrets.HOSTINGER_SFTP_KEY }}
          source: "dist/*"
          target: ${{ secrets.HOSTINGER_REMOTE_PATH }}
          overwrite: true
